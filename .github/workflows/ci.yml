name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newest run per branch wins; cancel the rest.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: feature_flags
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      ENV: dev
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/feature_flags?sslmode=disable
      # CI's Postgres is a bare GH Actions service, not our docker-compose.yml
      # (which publishes 5433 locally) — same host, different actual port.
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/feature_flags?sslmode=disable
      REDIS_ADDR: localhost:6379
      # Same split as TEST_DATABASE_URL: docker-compose publishes Redis on
      # 6380 locally (the tests' default), the GH Actions service is on 6379.
      TEST_REDIS_ADDR: localhost:6379
      LOG_LEVEL: debug

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Prebuilt binary, not `go install` (~1m faster).
      # Pinned to the release, not master: an unpinned install.sh broke on a
      # .sbom.json asset whose name prefixes the tarball's. Grep is anchored so
      # it can't match that sibling.
      - name: Install lint tools
        env:
          GOLANGCI_VERSION: 2.12.2
          GOVULNCHECK_VERSION: v1.6.0
        run: |
          set -euo pipefail
          base="https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_VERSION}"
          dir="golangci-lint-${GOLANGCI_VERSION}-linux-amd64"
          curl -sSfL "${base}/${dir}.tar.gz" -o "${dir}.tar.gz"
          curl -sSfL "${base}/golangci-lint-${GOLANGCI_VERSION}-checksums.txt" -o checksums.txt
          grep -E "  ${dir}\.tar\.gz\$" checksums.txt | sha256sum -c -
          tar -xzf "${dir}.tar.gz"
          install -m 0755 "${dir}/golangci-lint" "$(go env GOPATH)/bin/golangci-lint"
          rm -rf "${dir}" "${dir}.tar.gz" checksums.txt
          golangci-lint --version
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"

      # Same command a developer runs locally — a green check here means
      # `make lint` passes, reproducible without reading this file.
      - name: Lint (golangci-lint + govulncheck + dep guard)
        run: make lint

      # The GH Actions Postgres service starts empty — without this, every
      # integration test fails on "relation does not exist". Built and run
      # directly (not via `make migrate`, which drives docker-compose) since
      # DATABASE_URL above already points straight at the service container.
      - name: Migrate
        run: |
          go build -o bin/migrate ./cmd/migrate
          ./bin/migrate up

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Docker build
        run: make docker-build
