name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: feature_flags
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      ENV: dev
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/feature_flags?sslmode=disable
      REDIS_ADDR: localhost:6379
      LOG_LEVEL: debug

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install lint tools
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      # Same command a developer runs locally — a green check here means
      # `make lint` passes, reproducible without reading this file.
      - name: Lint (golangci-lint + govulncheck + dep guard)
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Docker build
        run: make docker-build
