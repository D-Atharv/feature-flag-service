version: "2"

linters:
  default: standard
  enable:
    - gosec
  exclusions:
    rules:
      # Test fixtures aren't real credentials; gosec's G101 can't tell the
      # difference and false-positives on any "user:pass@host" test string.
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
