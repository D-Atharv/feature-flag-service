# Render Blueprint for the feature flag service.
#
# Apply: Render dashboard -> New -> Blueprint -> pick this repo.
#
# No preDeployCommand: Render rejects it outright on the free web service

databases:
  - name: ffs-postgres
    databaseName: feature_flags
    user: ffs
    postgresMajorVersion: "16"
    plan: free

services:
  - type: keyvalue
    name: ffs-keyvalue
    plan: free
    ipAllowList: [] # empty = no external access; internal-only by default
    maxmemoryPolicy: noeviction # buckets carry their own TTL; don't evict them early

  - type: web
    name: ffs-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Render's Blueprint schema has no field for passing --build-arg to a
    # Dockerfile (confirmed: dockerBuildArgs is rejected by the validator, and
    # the docs list no equivalent for Docker-runtime services). VERSION/
    # GIT_SHA/BUILD_TIME therefore fall back to the Dockerfile's ARG defaults
    # ("dev"/"unknown"), so GET / will report those instead of the real commit.
    # Purely cosmetic — every other build-info field (RENDER_GIT_COMMIT etc.)
    # is still available at runtime via envVars below if this needs fixing
    # properly later; not worth the Dockerfile rework tonight.
    plan: free
    healthCheckPath: /healthz # liveness only — checks nothing external
    envVars:
      - key: ENV
        value: prod
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: ffs-postgres
          property: connectionString # internal URL, sslmode not required internally
      - key: REDIS_ADDR
        fromService:
          type: keyvalue
          name: ffs-keyvalue
          property: connectionString # redis://... internal; requires the ParseURL fix
    # PORT is deliberately absent — Render injects it, and config.Load() just
    # reads os.Getenv("PORT"). Setting it here would fight Render's router.
